services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5433:5432"
    volumes:
      - ./docker/init-postgis.sql:/docker-entrypoint-initdb.d/01-init-postgis.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 5s
      retries: 10
